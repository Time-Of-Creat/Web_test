<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мои задачи{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <a  class="navbar-brand" href="{% url 'task_list' %}">📝 Task Manager</a>
        <div class="ms-auto">
        {% if user.is_authenticated %}
            <span class="text-light me-2">Привет, {{ user.username }}!</span>
            <a href="{% url 'task_create' %}" class="btn btn-primary btn-sm me-2">+ Добавить задачу</a>
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">Выйти</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">Войти</a>
            <a href="{% url 'signup' %}" class="btn btn-light btn-sm">Регистрация</a>
        {% endif %}
    </div>
    </nav>
    <hr>

    <div  class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
