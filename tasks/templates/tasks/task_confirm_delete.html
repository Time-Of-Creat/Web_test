<!DOCTYPE html>
<html>
<head>
    <title>
        Удаление задачи
    </title>
</head>
<body>
    <h1>Удаление задачи</h1>

    <p>Вы уверены, что хотите удалить задачу "{{ object.title }}"?</p>

        <a href="{% url 'task_list' %}">Отмена</a>
    </form>
</body>
</html>
