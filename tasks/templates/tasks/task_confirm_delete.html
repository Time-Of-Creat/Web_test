{% extends 'tasks/base.html' %}

{% block title %}Удаление задачи{% endblock %}

{% block content %}
    <h1>Удаление задачи</h1>

    <p>Вы уверены, что хотите удалить задачу "{{ object.title }}"?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Да, удалить</button>
        <a href="{% url 'task_list' %}">Отмена</a>
    </form>
{% endblock %}
