<!-- tasks/templates/tasks/task_form.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Создание задачи</title>
</head>
<body>
    <h1>Новая задача</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Создать задачу</button>
    </form>

    <br>
    <a href="{% url 'task_list' %}">Назад к списку</a>
</body>
</html>
