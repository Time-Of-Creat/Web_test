{% extends 'tasks/base.html' %}

{% block title %}Создание задачи{% endblock %}

{% block content %}
    <h1>Новая задача</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Создать задачу</button>
    </form>

    <br>
    <a href="{% url 'task_list' %}">Назад к списку</a>
{% endblock %}
